{% extends "base.html" %}

{% block title %}Coming Soon | URMS{% endblock %}

{% block content %}
<div class="min-h-full px-4 py-16 sm:px-6 sm:py-24 md:grid md:place-items-center lg:px-8">
  <div class="mx-auto max-w-max text-center">
    <main class="sm:flex sm:items-center sm:justify-center">
      <div class="sm:ml-6">
        <div class="sm:border-l sm:border-gray-200 sm:pl-6">
          <h1 class="text-4xl font-bold tracking-tight text-gray-900 sm:text-5xl">Coming Soon</h1>
          <p class="mt-1 text-base text-gray-500">
             <span class="font-semibold text-brand-600">{{ feature_name }}</span> is currently under development for the next enterprise release.
          </p>
        </div>
        <div class="mt-10 flex space-x-3 sm:border-l sm:border-transparent sm:pl-6 justify-center">
          <a href="#" onclick="history.back(); return false;" class="inline-flex items-center rounded-md border border-transparent bg-brand-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2">

        </div>
      </div>
    </main>
  </div>
