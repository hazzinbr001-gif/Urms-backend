{% extends 'base.html' %}

{% block title %}Feature Not Available - URMS{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-yellow-100 mb-6">
        <i class="fa-solid fa-person-digging text-3xl text-yellow-600"></i>
    </div>
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Feature Under Construction</h1>
    <p class="text-lg text-gray-500 max-w-md">
        The <strong>{{ request.GET.feature|default:"requested" }}</strong> feature is currently being built and is not yet available in this environment.
    </p>
    <div class="mt-8">
        <a href="{% url 'dashboard' %}" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 transition-colors">
            <i class="fa-solid fa-arrow-left mr-2"></i>
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
