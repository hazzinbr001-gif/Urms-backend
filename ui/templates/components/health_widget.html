<div class="bg-white shadow rounded-lg border border-gray-200">
    <div class="px-5 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50 rounded-t-lg">
        <h3 class="text-lg leading-6 font-medium text-gray-900"><i class="fa-solid fa-heart-pulse text-brand-500 mr-2"></i> System Health</h3>
    </div>
    <div class="p-5">
        <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-3">
            <div class="sm:col-span-1">
                <dt class="text-sm font-medium text-gray-500">Database</dt>
                <dd class="mt-1 text-sm text-gray-900 flex items-center">
                    <span class="h-2.5 w-2.5 rounded-full {% if db_status == 'OK' %}bg-green-500{% else %}bg-red-500{% endif %} mr-2"></span>
                    {{ db_status|default:"Unknown" }}
                </dd>
            </div>
            <div class="sm:col-span-1">
                <dt class="text-sm font-medium text-gray-500">Cache (Redis)</dt>
                <dd class="mt-1 text-sm text-gray-900 flex items-center">
                    <span class="h-2.5 w-2.5 rounded-full {% if cache_status == 'OK' %}bg-green-500{% else %}bg-yellow-500{% endif %} mr-2"></span>
                    {{ cache_status|default:"Unknown" }}
                </dd>
            </div>
            <div class="sm:col-span-1">
                <dt class="text-sm font-medium text-gray-500">Background Workers</dt>
                <dd class="mt-1 text-sm text-gray-900 flex items-center">
                    <span class="h-2.5 w-2.5 rounded-full {% if worker_status == 'OK' %}bg-green-500{% else %}bg-red-500{% endif %} mr-2"></span>
                    {{ worker_status|default:"Unknown" }}
                </dd>
            </div>
        </dl>
    </div>
</div>
