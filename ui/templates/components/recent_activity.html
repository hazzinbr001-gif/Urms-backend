<div class="bg-white shadow rounded-lg border border-gray-200">
    <div class="px-5 py-4 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg leading-6 font-medium text-gray-900">{{ title|default:"Recent Activity" }}</h3>
        <a href="{% url 'governance_logs' %}" class="text-sm text-brand-600 hover:text-brand-900">View all</a>
    </div>
    <ul role="list" class="divide-y divide-gray-200">
        {% for item in activities %}
        <li class="px-5 py-4 hover:bg-gray-50 transition-colors">
            <div class="flex space-x-3">
                <div class="flex-shrink-0">
                    <span class="h-8 w-8 rounded-full bg-{{ item.color|default:'gray' }}-100 flex items-center justify-center">
                        <i class="{{ item.icon }} text-{{ item.color|default:'gray' }}-500 text-sm"></i>
                    </span>
                </div>
                <div class="min-w-0 flex-1 pt-1.5 flex justify-between space-x-4">
                    <div>
                        <p class="text-sm text-gray-500">{{ item.description|safe }}</p>
                    </div>
                    <div class="text-right text-sm whitespace-nowrap text-gray-500">
                        <time datetime="{{ item.timestamp }}">{{ item.time_ago }}</time>
                    </div>
                </div>
            </div>
        </li>
        {% empty %}
        <li class="px-5 py-6 text-center text-gray-500 text-sm">No recent activity found.</li>
        {% endfor %}
    </ul>
</div>
