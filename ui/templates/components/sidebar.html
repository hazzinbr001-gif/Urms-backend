{% load role_tags %}
<aside class="hidden md:flex flex-col w-64 bg-gray-900 text-gray-300 flex-shrink-0 border-r border-gray-800 transition-all duration-300">
    <div class="flex-1 overflow-y-auto py-6 px-3 space-y-8">

        <!-- Navigation Section -->
        <div>
            <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                Main Menu
            </h3>
            <nav class="space-y-1">
                <a href="{% url 'dashboard' %}" class="bg-gray-800 text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-gray-800 hover:text-white transition-colors">
                    <i class="fa-solid fa-chart-pie w-6 text-gray-400 group-hover:text-white mr-2"></i>
                    Dashboard
                </a>
                <a href="{% url 'placeholder' %}?feature=Proposals" class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors">
                    <i class="fa-regular fa-folder-open w-6 text-gray-400 group-hover:text-white mr-2"></i>
                    Proposals
                </a>
                <a href="{% url 'placeholder' %}?feature=Committees" class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors">
                    <i class="fa-solid fa-users-viewfinder w-6 text-gray-400 group-hover:text-white mr-2"></i>
                    Committees
                </a>
                <a href="{% url 'placeholder' %}?feature=AI_Intelligence" class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors">
                    <i class="fa-solid fa-brain w-6 text-brand-500 group-hover:text-brand-400 mr-2"></i>
                    AI Intelligence
                </a>
            </nav>
        </div>

        <!-- Administration Section -->
        {% if request.user|has_role:"RESEARCH_OFFICE_ADMIN" or request.user.is_superuser %}
        <div>
            <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">
                Administration
            </h3>
            <nav class="space-y-1">
                <a href="{% url 'placeholder' %}?feature=Institution_Settings" class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors">
                    <i class="fa-solid fa-building-columns w-6 text-gray-400 group-hover:text-white mr-2"></i>
                    Institution Settings
                </a>
                <a href="{% url 'placeholder' %}?feature=Governance_Logs" class="text-gray-400 hover:bg-gray-800 hover:text-white group flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-colors">
                    <i class="fa-solid fa-shield-halved w-6 text-gray-400 group-hover:text-white mr-2"></i>
                    Governance Logs
                </a>
            </nav>
        </div>
        {% endif %}
    </div>

    <!-- User/System Status Footer in Sidebar -->
    <div class="bg-gray-950 p-4 border-t border-gray-800">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-brand-500 animate-pulse"></div>
            <span class="text-xs text-gray-400 font-medium">System Online</span>
        </div>
    </div>
</aside>
