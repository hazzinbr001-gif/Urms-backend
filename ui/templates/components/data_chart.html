<div class="bg-white shadow rounded-lg border border-gray-200 p-5">
    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">{{ title }}</h3>
    <div class="relative w-full h-64">
        <canvas id="{{ chart_id }}"></canvas>
    </div>
</div>
<!-- Initialize Chart inline (or can be moved to block extra_js) -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('{{ chart_id }}').getContext('2d');
        const config = {{ chart_config|safe }};
        new Chart(ctx, config);
    });
</script>
