<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication | URMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <i class="fa-solid fa-shield-halved text-5xl text-blue-600 mb-4"></i>
        <h2 class="mt-2 text-center text-3xl font-bold tracking-tight text-gray-900">Security Verification</h2>
        <p class="mt-2 text-sm text-gray-600">
            We've sent a 6-digit verification code to your institution email.
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-200">
            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div class="p-4 mb-2 text-sm {% if message.tags == 'error' %}text-red-700 bg-red-100 rounded-lg{% else %}text-green-700 bg-green-100 rounded-lg{% endif %}" role="alert">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="space-y-6" action="{% url 'verify_2fa' %}" method="POST">
                {% csrf_token %}
                <div>
                    <label for="otp" class="block text-sm font-medium leading-6 text-gray-900 text-center">Enter 6-digit Code</label>
                    <div class="mt-2 flex justify-center">
                        <input id="otp" name="otp" type="text" maxlength="6" autocomplete="off" required class="block w-48 text-center text-2xl tracking-widest rounded-md border-0 py-2.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 px-3 font-mono">
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 transition-colors">
                        Verify & Login
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center text-sm">
                <p class="text-gray-500">Didn't receive the code? <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Resend Code</a></p>
            </div>
        </div>
    </div>
</body>
</html>
