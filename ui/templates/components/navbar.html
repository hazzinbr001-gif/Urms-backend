<header class="bg-white border-b border-gray-200 z-10 sticky top-0 flex-shrink-0">
    <div class="px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Brand / Logo Area -->
            <div class="flex items-center">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-8 h-8 rounded bg-brand-600 flex items-center justify-center text-white font-bold text-lg shadow-sm">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-gray-900">URMS Platform</span>
                </div>
            </div>

            <!-- Right-side Navigation (Profile, Notifications) -->
            <div class="flex items-center gap-4">
                <!-- Notifications Button -->
                <button type="button" class="p-2 text-gray-400 hover:text-gray-500 hover:bg-gray-100 rounded-full focus:outline-none focus:ring-2 focus:ring-brand-500 transition-colors">
                    <span class="sr-only">View notifications</span>
                    <i class="fa-regular fa-bell text-xl"></i>
                </button>

                <!-- Profile Dropdown Container -->
                <div class="relative ml-3 group">
                    <button type="button" class="flex items-center gap-2 max-w-xs bg-white rounded-full focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 transition-all">
                        <span class="sr-only">Open user menu</span>
                        <div class="h-9 w-9 rounded-full bg-gray-200 border border-gray-300 flex items-center justify-center text-gray-600 font-medium">
                            {{ request.user.username|default:"A"|slice:":1"|upper }}
                        </div>
                        <div class="hidden md:flex flex-col items-start ml-1">
                            <span class="text-sm font-medium text-gray-700">{{ request.user.username|default:"Admin User" }}</span>
                            <span class="text-xs text-gray-500">Institution</span>
                        </div>
                        <i class="fa-solid fa-chevron-down text-gray-400 text-xs ml-1 hidden md:block group-hover:text-gray-600"></i>
                    </button>
                    <!-- Dropdown Content (Hidden by default, can be toggled via JS/Alpine) -->
                </div>
            </div>
        </div>
    </div>
</header>
